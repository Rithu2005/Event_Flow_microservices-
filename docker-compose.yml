version: '3.8'

services:
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventflow_auth
    ports:
      - "3310:3306"
    networks:
      - eventflow-network
    restart: always

  mysql-event:
    image: mysql:8.0
    container_name: mysql-event
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventflow_event
    ports:
      - "3311:3306"
    networks:
      - eventflow-network
    restart: always

  mysql-ticket:
    image: mysql:8.0
    container_name: mysql-ticket
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventflow_ticket
    ports:
      - "3312:3306"
    networks:
      - eventflow-network
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - eventflow-network
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - eventflow-network
    restart: always

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - eventflow-network
    restart: always

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/eventflow_auth
    depends_on:
      - discovery-service
    networks:
      - eventflow-network
    restart: always

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/eventflow_auth
    depends_on:
      - discovery-service
      - mysql-auth
    networks:
      - eventflow-network
    restart: always

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-service
    networks:
      - eventflow-network
    restart: always

  event-service:
    build: ./event-service
    container_name: event-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-event:3306/eventflow_event
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - discovery-service
      - mysql-event
      - kafka
    networks:
      - eventflow-network
    restart: always

  ticket-service:
    build: ./ticket-service
    container_name: ticket-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-ticket:3306/eventflow_ticket
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - discovery-service
      - mysql-ticket
      - kafka
    networks:
      - eventflow-network
    restart: always

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - discovery-service
      - kafka
    networks:
      - eventflow-network
    restart: always

networks:
  eventflow-network:
    driver: bridge
