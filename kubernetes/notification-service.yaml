apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: eventflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: eventflow/notification-service:latest
        ports:
        - containerPort: 8085
        env:
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: eventflow-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: eventflow-config
              key: EUREKA_SERVER
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: eventflow
spec:
  selector:
    app: notification-service
  ports:
  - protocol: TCP
    port: 8085
    targetPort: 8085
