apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: eventflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: eventflow/user-service:latest
        ports:
        - containerPort: 8084
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: eventflow-config
              key: EUREKA_SERVER
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: eventflow
spec:
  selector:
    app: user-service
  ports:
  - protocol: TCP
    port: 8084
    targetPort: 8084
