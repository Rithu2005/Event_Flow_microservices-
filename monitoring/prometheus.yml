global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eventflow-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - 'discovery-service:8761'
        - 'api-gateway:8080'
        - 'auth-service:8081'
        - 'event-service:8082'
        - 'ticket-service:8083'
        - 'notification-service:8084'
