server:
  port: 8083

spring:
  application:
    name: user-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      defaults:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
